<div
  class="grid min-h-dvh grid-cols-1 lg:grid-cols-[minmax(0,1fr)_minmax(0,520px)]"
>
  <aside
    class="relative hidden flex-col justify-between overflow-hidden bg-slate-900 px-10 py-12 text-white lg:flex"
    aria-hidden="true"
  >
    <div
      class="pointer-events-none absolute inset-0 bg-[radial-gradient(ellipse_80%_60%_at_20%_0%,rgba(59,130,246,0.22),transparent_55%),radial-gradient(ellipse_60%_50%_at_80%_100%,rgba(148,163,184,0.12),transparent_50%)]"
    ></div>
    <div class="relative z-10">
      <a
        routerLink="/auth/login"
        class="inline-flex items-center gap-2 text-lg font-semibold tracking-tight text-white no-underline"
      >
        <span
          class="flex h-9 w-9 items-center justify-center rounded-lg bg-white/10 text-sm font-bold ring-1 ring-white/15"
          >N</span
        >
        {{ 'common.appName' | translate }}
      </a>
      <p class="mt-10 max-w-sm text-[15px] leading-relaxed text-slate-300">
        {{ 'authAside.lead' | translate }}
      </p>
    </div>
    <p class="relative z-10 text-xs text-slate-500">© {{ year }} Nexus Retail</p>
  </aside>

  <div
    class="flex flex-col bg-slate-50/90 px-5 py-10 sm:px-10 lg:px-14 lg:py-12"
  >
    <header class="mb-6 flex flex-wrap items-start justify-between gap-4 lg:mb-8">
      <a
        routerLink="/auth/login"
        class="inline-flex items-center gap-2 text-base font-semibold tracking-tight text-slate-900 no-underline lg:hidden"
      >
        <span
          class="flex h-9 w-9 items-center justify-center rounded-lg bg-slate-900 text-sm font-bold text-white"
          >N</span
        >
        {{ 'common.appName' | translate }}
      </a>
      <div class="ml-auto w-full max-w-[220px] sm:w-auto">
        <app-language-switcher />
      </div>
    </header>

    <main class="flex flex-1 flex-col justify-center">
      <router-outlet />
    </main>
  </div>
</div>
