<div
  class="rounded-2xl border border-slate-200/80 bg-white p-8 shadow-sm shadow-slate-200/60 sm:p-10"
>
  <h1 class="text-2xl font-semibold tracking-tight text-slate-900">
    {{ 'forgot.title' | translate }}
  </h1>
  <p class="mt-2 text-[15px] leading-relaxed text-slate-600">
    {{ 'forgot.subtitle' | translate }}
  </p>

  <form class="mt-8 space-y-5" (ngSubmit)="forgotPassword()">
    <div class="space-y-2">
      <label for="forgot-email" class="block text-sm font-medium text-slate-700">
        {{ 'forgot.email' | translate }}
      </label>
      <input
        id="forgot-email"
        name="email"
        type="email"
        autocomplete="email"
        [placeholder]="'forgot.emailPlaceholder' | translate"
        class="w-full rounded-lg border border-slate-200 bg-slate-50/50 px-3.5 py-3 text-[16px] text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-slate-400 focus:bg-white focus:ring-2 focus:ring-slate-900/10"
      />
    </div>

    <button
      type="submit"
      class="flex w-full items-center justify-center rounded-lg bg-slate-900 px-4 py-3.5 text-[15px] font-semibold text-white shadow-sm transition hover:bg-slate-800 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900 active:scale-[0.99]"
    >
      {{ 'forgot.sendResetLink' | translate }}
    </button>
  </form>

  <p class="mt-8 text-center text-[15px] text-slate-600">
    <a
      routerLink="/auth/login"
      class="font-semibold text-slate-900 underline-offset-4 hover:underline"
      >{{ 'forgot.backToSignIn' | translate }}</a
    >
  </p>
</div>
